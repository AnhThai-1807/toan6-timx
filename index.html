```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THỬ THÁCH TÌM X – TOÁN 6</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#fff8d6,#dff7ff,#ffe7c7);
    min-height:100vh;
    padding:20px;
    color:#333;
}

.container{
    max-width:900px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:42px;
    color:#ff7b00;
    margin-bottom:10px;
}

header p{
    font-size:18px;
    color:#555;
}

.icons{
    font-size:30px;
    margin-top:10px;
}

.quiz-card{
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    animation:fadeIn 0.6s ease;
}

.question-number{
    font-size:24px;
    font-weight:bold;
    color:#ff7b00;
    margin-bottom:20px;
}

.math-icon{
    font-size:45px;
    text-align:center;
    margin-bottom:15px;
}

.question-text{
    font-size:28px;
    text-align:center;
    line-height:1.8;
    margin-bottom:30px;
}

.answers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.answer-btn{
    min-height:75px;
    padding:18px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    background:#f3f7ff;
    transition:0.3s;
    border:3px solid transparent;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    line-height:1.5;
}

.answer-btn:hover{
    transform:scale(1.03);
    background:#dff2ff;
}

.answer-btn.selected{
    background:#ffe9b5;
    border-color:#ffb300;
}

.answer-btn.correct{
    background:#bdf7c3 !important;
    border-color:#00a82d;
    box-shadow:0 0 15px #8cff98;
}

.answer-btn.wrong{
    background:#ffc4c4 !important;
    border-color:#ff3b3b;
}

.controls{
    text-align:center;
    margin-top:30px;
}

.main-btn{
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ffb100,#ff7b00);
    color:white;
    font-size:20px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
    font-weight:bold;
}

.main-btn:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}

.message{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
    min-height:40px;
}

.correct-msg{
    color:#00a82d;
}

.wrong-msg{
    color:#e53935;
}

.result-box{
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
    animation:popup 0.6s ease;
}

.sound-btn{
    position:fixed;
    top:15px;
    right:15px;
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:white;
    cursor:pointer;
    font-size:24px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#666;
}

/* PHÂN SỐ */

.fraction{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    vertical-align:middle;
    line-height:1;
    margin:0 2px;
}

.fraction .top{
    border-bottom:2px solid #333;
    padding:0 6px 3px 6px;
    font-size:0.9em;
}

.fraction .bottom{
    padding-top:3px;
    font-size:0.9em;
}

.big{
    font-size:1.2em;
}

.mixed-number{
    display:inline-flex;
    align-items:center;
    gap:3px;
    vertical-align:middle;
}

/* HIỆU ỨNG */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    50%{transform:translateX(8px);}
    75%{transform:translateX(-8px);}
    100%{transform:translateX(0);}
}

.shake{
    animation:shake 0.4s;
}

/* MOBILE */

@media(max-width:700px){

    .answers{
        grid-template-columns:1fr;
    }

    .question-text{
        font-size:22px;
    }

    header h1{
        font-size:30px;
    }

}

</style>
</head>

<body>

<button class="sound-btn" id="soundToggle">🔊</button>

<div class="container">

<header>

<h1>THỬ THÁCH TÌM X – TOÁN 6</h1>

<p>
Các con hãy tính toán cẩn thận và chọn giá trị đúng của x nhé!
</p>

<div class="icons">
➕ ➖ ✖️ ➗ 🎯
</div>

</header>

<div id="quizContainer"></div>

<div id="finalResult" class="hidden"></div>

<div class="footer">
Trò chơi học tập tương tác môn Toán 6
</div>

</div>

<!-- ÂM THANH -->

<audio id="bgMusic" loop autoplay>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=children-background-music-110624.mp3">
</audio>

<audio id="correctSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f1a4514b6.mp3?filename=success-fanfare-trumpets-6185.mp3">
</audio>

<audio id="wrongSound">
<source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_bb630cc098.mp3?filename=error-126627.mp3">
</audio>

<script>

const questions = [

{
    icon:"➕",
    question:`x + 3,75 = 8,2`,
    answers:["4,45","5,45","11,95","12,2"],
    correct:0
},

{
    icon:"➖",
    question:`

        x −

        <span class="mixed-number">
            <span>2</span>

            <span class="fraction">
                <span class="top">1</span>
                <span class="bottom">3</span>
            </span>
        </span>

        =

        <span class="mixed-number">
            <span>5</span>

            <span class="fraction">
                <span class="top">1</span>
                <span class="bottom">6</span>
            </span>
        </span>

    `,
    answers:[

        `
        <span class="mixed-number">
            <span>2</span>

            <span class="fraction">
                <span class="top">5</span>
                <span class="bottom">6</span>
            </span>
        </span>
        `,

        `
        <span class="mixed-number">
            <span>7</span>

            <span class="fraction">
                <span class="top">1</span>
                <span class="bottom">2</span>
            </span>
        </span>
        `,

        `
        <span class="mixed-number">
            <span>7</span>

            <span class="fraction">
                <span class="top">1</span>
                <span class="bottom">3</span>
            </span>
        </span>
        `,

        `8`

    ],
    correct:1
},

{
    icon:"➖",
    question:`15 − x = 6,8`,
    answers:["7,2","8,2","9,2","21,8"],
    correct:1
},

{
    icon:"✖️",
    question:`

        <span class="fraction big">
            <span class="top">3</span>
            <span class="bottom">5</span>
        </span>

        × x = 9

    `,
    answers:["12","15","18","27"],
    correct:1
},

{
    icon:"➗",
    question:`x : 1,5 = 8`,
    answers:["9,5","10","12","12,5"],
    correct:2
},

{
    icon:"➗",
    question:`

        <span class="fraction big">
            <span class="top">7</span>
            <span class="bottom">8</span>
        </span>

        : x =

        <span class="fraction big">
            <span class="top">1</span>
            <span class="bottom">4</span>
        </span>

    `,
    answers:[

        `
        <span class="fraction big">
            <span class="top">7</span>
            <span class="bottom">2</span>
        </span>
        `,

        `
        <span class="fraction big">
            <span class="top">1</span>
            <span class="bottom">2</span>
        </span>
        `,

        `
        <span class="fraction big">
            <span class="top">7</span>
            <span class="bottom">4</span>
        </span>
        `,

        `
        <span class="fraction big">
            <span class="top">8</span>
            <span class="bottom">7</span>
        </span>
        `

    ],
    correct:0
},

{
    icon:"x²",
    question:`x² = 81`,
    answers:[
        "x = 9",
        "x = −9",
        "x = 9 hoặc x = −9",
        "x = 81"
    ],
    correct:2
},

{
    icon:"x³",
    question:`x³ = −125`,
    answers:["−25","−5","5","25"],
    correct:1
},

{
    icon:"🎯",
    question:`2ˣ = 32`,
    answers:["4","5","6","8"],
    correct:1
},

{
    icon:"🎯",
    question:`(x − 2)(x + 5) = 0`,
    answers:[
        "x = 2 hoặc x = −5",
        "x = 2 hoặc x = 5",
        "x = −2 hoặc x = 5",
        "x = −2 hoặc x = −5"
    ],
    correct:0
}

];

let currentQuestion = 0;
let selectedAnswer = null;
let score = 0;

const quizContainer = document.getElementById("quizContainer");
const finalResult = document.getElementById("finalResult");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const bgMusic = document.getElementById("bgMusic");

bgMusic.volume = 0.2;

document.getElementById("soundToggle").addEventListener("click",()=>{

    if(bgMusic.paused){

        bgMusic.play();
        document.getElementById("soundToggle").innerHTML="🔊";

    }else{

        bgMusic.pause();
        document.getElementById("soundToggle").innerHTML="🔇";
    }

});

function renderQuestion(){

    const q = questions[currentQuestion];

    quizContainer.innerHTML = `

    <div class="quiz-card">

        <div class="question-number">
            Câu ${currentQuestion + 1}. Tìm x
        </div>

        <div class="math-icon">
            ${q.icon}
        </div>

        <div class="question-text">
            ${q.question}
        </div>

        <div class="answers">

            ${q.answers.map((ans,index)=>`

                <button class="answer-btn"
                    onclick="selectAnswer(${index})">

                    ${String.fromCharCode(65+index)}. ${ans}

                </button>

            `).join("")}

        </div>

        <div class="controls">

            <button id="submitBtn"
                class="main-btn hidden"
                onclick="submitAnswer()">

                NỘP BÀI

            </button>

            <button id="retryBtn"
                class="main-btn hidden"
                onclick="retryQuestion()">

                LÀM LẠI

            </button>

            <button id="nextBtn"
                class="main-btn hidden"
                onclick="nextQuestion()">

                CÂU TIẾP THEO

            </button>

            <div id="message" class="message"></div>

        </div>

    </div>
    `;

    selectedAnswer = null;
}

function selectAnswer(index){

    selectedAnswer = index;

    const buttons = document.querySelectorAll(".answer-btn");

    buttons.forEach(btn=>{
        btn.classList.remove("selected");
    });

    buttons[index].classList.add("selected");

    document.getElementById("submitBtn")
    .classList.remove("hidden");
}

function submitAnswer(){

    if(selectedAnswer === null) return;

    const q = questions[currentQuestion];

    const buttons =
    document.querySelectorAll(".answer-btn");

    const message =
    document.getElementById("message");

    if(selectedAnswer === q.correct){

        correctSound.play();

        buttons[selectedAnswer]
        .classList.add("correct");

        message.innerHTML =
        "🎉 Chính xác! Con làm rất tốt!";

        message.className =
        "message correct-msg";

        document.getElementById("nextBtn")
        .classList.remove("hidden");

        document.getElementById("submitBtn")
        .classList.add("hidden");

        score++;

    }else{

        wrongSound.play();

        buttons[selectedAnswer]
        .classList.add("wrong");

        document.querySelector(".quiz-card")
        .classList.add("shake");

        setTimeout(()=>{

            document.querySelector(".quiz-card")
            .classList.remove("shake");

        },400);

        message.innerHTML =
        "💪 Chưa đúng rồi! Hãy thử lại nhé!";

        message.className =
        "message wrong-msg";

        document.getElementById("retryBtn")
        .classList.remove("hidden");

        document.getElementById("submitBtn")
        .classList.add("hidden");
    }

    buttons.forEach(btn=>{
        btn.disabled = true;
    });
}

function retryQuestion(){

    renderQuestion();
}

function nextQuestion(){

    currentQuestion++;

    if(currentQuestion < questions.length){

        renderQuestion();

    }else{

        showFinalResult();
    }
}

function showFinalResult(){

    quizContainer.innerHTML = "";

    let comment = "";

    if(score === 10){

        comment = "🎉 Xuất sắc!";

    }else if(score >= 7){

        comment = "👏 Rất tốt!";

    }else if(score >= 5){

        comment = "😊 Khá lắm!";

    }else{

        comment = "💪 Cố gắng thêm nhé!";
    }

    finalResult.classList.remove("hidden");

    finalResult.innerHTML = `

    <div class="result-box">

        <h2>KẾT QUẢ CUỐI CÙNG</h2>

        <p style="font-size:28px;margin:20px 0;">

            Con trả lời đúng
            <b>${score}/10</b> câu

        </p>

        <p style="font-size:28px;color:#ff7b00;">
            ${comment}
        </p>

        <button class="main-btn"
            onclick="restartGame()">

            LÀM LẠI TOÀN BỘ

        </button>

    </div>
    `;
}

function restartGame(){

    currentQuestion = 0;
    score = 0;

    finalResult.classList.add("hidden");

    renderQuestion();
}

renderQuestion();

</script>

</body>
</html>
```
